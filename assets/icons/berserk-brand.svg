<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Berserk Brand Symbol -->
  <defs>
    <radialGradient id="brandGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8B0000;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Glow background -->
  <circle cx="50" cy="50" r="40" fill="url(#brandGlow)" opacity="0.3"/>

  <!-- Brand symbol -->
  <g stroke="#8B0000" stroke-width="2" fill="none">
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="35" stroke-width="1" opacity="0.5"/>

    <!-- Central pentagram-like shape -->
    <path d="M50 20 L60 40 L85 40 L65 55 L75 80 L50 65 L25 80 L35 55 L15 40 L40 40 Z"
          stroke="#FF0000" stroke-width="2" fill="rgba(139,0,0,0.2)"/>

    <!-- Inner lines -->
    <line x1="50" y1="20" x2="50" y2="65" stroke="#FF0000" stroke-width="1.5"/>
    <line x1="60" y1="40" x2="25" y2="80" stroke="#FF0000" stroke-width="1.5"/>
    <line x1="85" y1="40" x2="35" y2="55" stroke="#FF0000" stroke-width="1.5"/>
    <line x1="65" y1="55" x2="15" y2="40" stroke="#FF0000" stroke-width="1.5"/>
    <line x1="75" y1="80" x2="40" y2="40" stroke="#FF0000" stroke-width="1.5"/>
  </g>

  <!-- Blood drops -->
  <circle cx="50" cy="25" r="2" fill="#FF0000"/>
  <circle cx="20" cy="50" r="1.5" fill="#8B0000" opacity="0.7"/>
  <circle cx="80" cy="50" r="1.5" fill="#8B0000" opacity="0.7"/>
</svg>